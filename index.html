                    url: "https://gh-proxy.org/https://raw.githubusercontent.com/Jsnzkpg/stymei/Jsnzkpg/index.js.md5",
                    isExclusive: false,
                    svg: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M12 2c5.523 0 10 4.477 10 10a9.96 9.96 0 0 1-6.383 9.302c-.5.092-.682-.217-.682-.483 0-.237.008-.868.013-1.703 2.782.605 3.369-1.343 3.369-1.343-.454-1.155-1.11-1.462-1.11-1.462-.908-.62.069-.061.069-.061 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0 1 12 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0 1 22 12c0-5.523-4.477-10-10-10z"/></svg>`
                }
            ];

            function renderButtons() {
                const container = document.getElementById('buttons-box');
                if (!container) return;
                container.innerHTML = '';
                BUTTONS_CONFIG.forEach(btn => {
                    const btnDiv = document.createElement('button');
                    btnDiv.className = 'ios-item';

                    const badgeHtml = btn.isExclusive
                        ? `<span class="exclusive-badge">★ 独家</span>`
                        : '';

                    const descHtml = (btn.desc && btn.desc.length > 0) ? `<span class="item-desc">${btn.desc}</span>` : '';

                    btnDiv.innerHTML = `
                        <div class="item-icon-box" style="background: ${btn.bg}">
                            ${btn.svg}
                        </div>
                        <div class="item-content">
                            <span class="item-title">${btn.name}</span>
                            ${descHtml}
                        </div>
                        ${badgeHtml}
                        <div class="chevron">
                            <svg width="7" height="12" viewBox="0 0 7 12" fill="none" xmlns="http://www.w3.org/2000/svg">
                                <path d="M1 1L6 6L1 11" stroke="#C4C4C6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                            </svg>
                        </div>
                    `;

                    btnDiv.onclick = function(e) {
                        e.preventDefault();
                        window.location.href = btn.url;
                    };
                    container.appendChild(btnDiv);
                });
            }

            renderButtons();
        })();
    </script>
</body>
